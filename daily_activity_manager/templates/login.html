<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 日常活动管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-card { background: #fff; border-radius: 12px; padding: 40px; width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .auth-card h2 { text-align: center; margin-bottom: 24px; color: #2c3e50; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: #3498db; }
        .form-group input:disabled { background: #f5f5f5; color: #999; }
        .btn-submit { width: 100%; padding: 12px; background: #3498db; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
        .btn-submit:hover { background: #2980b9; }
        .btn-submit:disabled { background: #bdc3c7; cursor: not-allowed; }
        .error-msg { color: #e74c3c; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
        .link-row { text-align: center; margin-top: 16px; font-size: 14px; color: #888; }
        .link-row a { color: #3498db; text-decoration: none; }
        .link-row a:hover { text-decoration: underline; }

        /* Tabs */
        .login-tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #eee; }
        .login-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 14px; color: #999; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .login-tab:hover { color: #555; }
        .login-tab.active { color: #3498db; border-bottom-color: #3498db; font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* SMS row */
        .sms-row { display: flex; gap: 8px; }
        .sms-row input { flex: 1; }
        .btn-sms { padding: 10px 16px; background: #27ae60; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; min-width: 110px; }
        .btn-sms:hover { background: #219a52; }
        .btn-sms:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Lockout overlay */
        .lockout-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.92); border-radius: 12px; z-index: 10; flex-direction: column; align-items: center; justify-content: center; }
        .lockout-overlay.active { display: flex; }
        .lockout-timer { font-size: 48px; font-weight: bold; color: #e74c3c; }
        .lockout-msg { font-size: 14px; color: #666; margin-top: 8px; }
        .auth-card { position: relative; overflow: hidden; }
    </style>
</head>
<body>
    <div class="auth-card">
        <!-- Lockout overlay -->
        <div class="lockout-overlay" id="lockoutOverlay">
            <div class="lockout-timer" id="lockoutTimer">60</div>
            <div class="lockout-msg">登录尝试过多，请稍后再试</div>
        </div>

        <h2>登录</h2>

        <div class="login-tabs">
            <div class="login-tab active" onclick="switchTab('password')">账号密码登录</div>
            <div class="login-tab" onclick="switchTab('sms')">手机验证码登录</div>
        </div>

        <!-- Password login -->
        <div class="tab-content active" id="tabPassword">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="btn-submit" id="btnLogin" onclick="doPasswordLogin()">登录</button>
        </div>

        <!-- SMS login -->
        <div class="tab-content" id="tabSms">
            <div class="form-group">
                <label>手机号</label>
                <input type="tel" id="phone" placeholder="请输入绑定的手机号">
            </div>
            <div class="form-group">
                <label>验证码</label>
                <div class="sms-row">
                    <input type="text" id="smsCode" placeholder="请输入验证码" maxlength="6">
                    <button class="btn-sms" id="btnSendSms" onclick="sendSmsCode()">获取验证码</button>
                </div>
            </div>
            <button class="btn-submit" id="btnSmsLogin" onclick="doSmsLogin()">登录</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="link-row">还没有账号？ <a href="/register">立即注册</a></div>
    </div>

    <script>
        let lockoutInterval = null;
        let smsCountdown = null;

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            if (tab === 'password') {
                document.querySelectorAll('.login-tab')[0].classList.add('active');
                document.getElementById('tabPassword').classList.add('active');
            } else {
                document.querySelectorAll('.login-tab')[1].classList.add('active');
                document.getElementById('tabSms').classList.add('active');
            }
            document.getElementById('errorMsg').textContent = '';
        }

        // Lockout handling
        function startLockout(seconds) {
            const overlay = document.getElementById('lockoutOverlay');
            const timer = document.getElementById('lockoutTimer');
            overlay.classList.add('active');
            let remaining = seconds;
            timer.textContent = remaining;

            if (lockoutInterval) clearInterval(lockoutInterval);
            lockoutInterval = setInterval(() => {
                remaining--;
                timer.textContent = remaining;
                if (remaining <= 0) {
                    clearInterval(lockoutInterval);
                    lockoutInterval = null;
                    overlay.classList.remove('active');
                    document.getElementById('errorMsg').textContent = '';
                }
            }, 1000);
        }

        function handleLoginResponse(res, data) {
            if (res.ok) {
                window.location.href = '/';
                return true;
            }
            if (data.locked) {
                startLockout(data.remaining || 60);
            }
            document.getElementById('errorMsg').textContent = data.error || '登录失败';
            return false;
        }

        // Password login
        async function doPasswordLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('errorMsg');
            errEl.textContent = '';

            if (!username || !password) { errEl.textContent = '请输入用户名和密码'; return; }

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await res.json();
            handleLoginResponse(res, data);
        }

        // SMS code sending
        async function sendSmsCode() {
            const phone = document.getElementById('phone').value.trim();
            const errEl = document.getElementById('errorMsg');
            errEl.textContent = '';

            if (!phone) { errEl.textContent = '请输入手机号'; return; }

            const btn = document.getElementById('btnSendSms');
            btn.disabled = true;

            const res = await fetch('/api/auth/sms/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone }),
            });
            const data = await res.json();

            if (res.ok) {
                // Start 60s countdown for resend
                let cd = 60;
                btn.textContent = `${cd}秒后重试`;
                smsCountdown = setInterval(() => {
                    cd--;
                    btn.textContent = `${cd}秒后重试`;
                    if (cd <= 0) {
                        clearInterval(smsCountdown);
                        smsCountdown = null;
                        btn.textContent = '获取验证码';
                        btn.disabled = false;
                    }
                }, 1000);
                errEl.style.color = '#27ae60';
                errEl.textContent = '验证码已发送，请查看控制台输出';
                setTimeout(() => { errEl.style.color = '#e74c3c'; }, 3000);
            } else {
                btn.disabled = false;
                if (data.locked) startLockout(data.remaining || 60);
                errEl.textContent = data.error || '发送失败';
            }
        }

        // SMS login
        async function doSmsLogin() {
            const phone = document.getElementById('phone').value.trim();
            const code = document.getElementById('smsCode').value.trim();
            const errEl = document.getElementById('errorMsg');
            errEl.textContent = '';

            if (!phone || !code) { errEl.textContent = '请输入手机号和验证码'; return; }

            const res = await fetch('/api/auth/sms/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, code }),
            });
            const data = await res.json();
            handleLoginResponse(res, data);
        }

        // Enter key handlers
        document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') doPasswordLogin(); });
        document.getElementById('username').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
        document.getElementById('smsCode').addEventListener('keypress', e => { if (e.key === 'Enter') doSmsLogin(); });
        document.getElementById('phone').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('smsCode').focus(); });

        // Check lockout on page load
        (async function() {
            const res = await fetch('/api/auth/lockout');
            const data = await res.json();
            if (data.locked && data.remaining > 0) {
                startLockout(data.remaining);
            }
        })();
    </script>
</body>
</html>
