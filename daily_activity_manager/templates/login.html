<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 日常活动管理系统</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fc; display: flex; justify-content: center; align-items: center; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .auth-card { background: #fff; border-radius: 20px; padding: 48px; width: 440px; border: 1px solid #eef0f4; position: relative; overflow: hidden; }
        .auth-card h2 { text-align: center; margin-bottom: 6px; font-size: 24px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.5px; }
        .auth-subtitle { text-align: center; color: #8b8fa8; font-size: 14px; margin-bottom: 32px; font-weight: 400; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #6b7085; font-weight: 600; letter-spacing: 0.2px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #eef0f4; border-radius: 12px; font-size: 14px; transition: border-color 0.15s, box-shadow 0.15s; background: #fafbfd; color: #1a1a2e; }
        .form-group input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.08); background: #fff; }
        .form-group input:disabled { background: #f3f4f6; color: #b0b4c8; }
        .btn-submit { width: 100%; padding: 13px; background: #4f46e5; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
        .btn-submit:hover { background: #4338ca; }
        .btn-submit:disabled { background: #d1d5e0; cursor: not-allowed; }
        .error-msg { color: #ef4444; font-size: 13px; text-align: center; margin-top: 16px; min-height: 20px; font-weight: 500; }
        .link-row { text-align: center; margin-top: 24px; font-size: 14px; color: #8b8fa8; }
        .link-row a { color: #4f46e5; text-decoration: none; font-weight: 600; }
        .link-row a:hover { text-decoration: underline; }

        /* Tabs */
        .login-tabs { display: flex; margin-bottom: 28px; background: #f3f4f6; border-radius: 12px; padding: 4px; }
        .login-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; color: #8b8fa8; cursor: pointer; border-radius: 10px; transition: all 0.2s; font-weight: 500; }
        .login-tab:hover { color: #3a3d52; }
        .login-tab.active { color: #fff; background: #4f46e5; font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* SMS row */
        .sms-row { display: flex; gap: 10px; }
        .sms-row input { flex: 1; }
        .btn-sms { padding: 12px 18px; background: #10b981; color: #fff; border: none; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; min-width: 110px; transition: background 0.15s; }
        .btn-sms:hover { background: #059669; }
        .btn-sms:disabled { background: #d1d5e0; cursor: not-allowed; }

        /* Lockout overlay */
        .lockout-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.97); border-radius: 20px; z-index: 10; flex-direction: column; align-items: center; justify-content: center; }
        .lockout-overlay.active { display: flex; }
        .lockout-timer { font-size: 56px; font-weight: 800; color: #ef4444; letter-spacing: -2px; }
        .lockout-msg { font-size: 14px; color: #8b8fa8; margin-top: 12px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="lockout-overlay" id="lockoutOverlay">
            <div class="lockout-timer" id="lockoutTimer">60</div>
            <div class="lockout-msg">登录尝试过多，请稍后再试</div>
        </div>

        <h2>欢迎回来</h2>
        <div class="auth-subtitle">登录到日常活动管理系统</div>

        <div class="login-tabs">
            <div class="login-tab active" onclick="switchTab('password')">账号密码</div>
            <div class="login-tab" onclick="switchTab('sms')">手机验证码</div>
        </div>

        <div class="tab-content active" id="tabPassword">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="btn-submit" id="btnLogin" onclick="doPasswordLogin()">登录</button>
        </div>

        <div class="tab-content" id="tabSms">
            <div class="form-group">
                <label>手机号</label>
                <input type="tel" id="phone" placeholder="请输入绑定的手机号">
            </div>
            <div class="form-group">
                <label>验证码</label>
                <div class="sms-row">
                    <input type="text" id="smsCode" placeholder="请输入验证码" maxlength="6">
                    <button class="btn-sms" id="btnSendSms" onclick="sendSmsCode()">获取验证码</button>
                </div>
            </div>
            <button class="btn-submit" id="btnSmsLogin" onclick="doSmsLogin()">登录</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="link-row">还没有账号？ <a href="/register">立即注册</a></div>
    </div>

    <script>
        let lockoutInterval = null;
        let smsCountdown = null;

        function switchTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            if (tab === 'password') {
                document.querySelectorAll('.login-tab')[0].classList.add('active');
                document.getElementById('tabPassword').classList.add('active');
            } else {
                document.querySelectorAll('.login-tab')[1].classList.add('active');
                document.getElementById('tabSms').classList.add('active');
            }
            document.getElementById('errorMsg').textContent = '';
        }

        function startLockout(seconds) {
            const overlay = document.getElementById('lockoutOverlay');
            const timer = document.getElementById('lockoutTimer');
            overlay.classList.add('active');
            let remaining = seconds;
            timer.textContent = remaining;
            if (lockoutInterval) clearInterval(lockoutInterval);
            lockoutInterval = setInterval(() => {
                remaining--;
                timer.textContent = remaining;
                if (remaining <= 0) {
                    clearInterval(lockoutInterval);
                    lockoutInterval = null;
                    overlay.classList.remove('active');
                    document.getElementById('errorMsg').textContent = '';
                }
            }, 1000);
        }

        function handleLoginResponse(res, data) {
            if (res.ok) { window.location.href = '/'; return true; }
            if (data.locked) startLockout(data.remaining || 60);
            document.getElementById('errorMsg').textContent = data.error || '登录失败';
            return false;
        }

        async function doPasswordLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('errorMsg');
            errEl.textContent = '';
            if (!username || !password) { errEl.textContent = '请输入用户名和密码'; return; }
            const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            const data = await res.json();
            handleLoginResponse(res, data);
        }

        async function sendSmsCode() {
            const phone = document.getElementById('phone').value.trim();
            const errEl = document.getElementById('errorMsg');
            errEl.textContent = '';
            if (!phone) { errEl.textContent = '请输入手机号'; return; }
            const btn = document.getElementById('btnSendSms');
            btn.disabled = true;
            const res = await fetch('/api/auth/sms/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone }) });
            const data = await res.json();
            if (res.ok) {
                let cd = 60;
                btn.textContent = `${cd}秒后重试`;
                smsCountdown = setInterval(() => {
                    cd--;
                    btn.textContent = `${cd}秒后重试`;
                    if (cd <= 0) { clearInterval(smsCountdown); smsCountdown = null; btn.textContent = '获取验证码'; btn.disabled = false; }
                }, 1000);
                errEl.style.color = '#10b981';
                errEl.textContent = '验证码已发送，请查看控制台输出';
                setTimeout(() => { errEl.style.color = '#ef4444'; }, 3000);
            } else {
                btn.disabled = false;
                if (data.locked) startLockout(data.remaining || 60);
                errEl.textContent = data.error || '发送失败';
            }
        }

        async function doSmsLogin() {
            const phone = document.getElementById('phone').value.trim();
            const code = document.getElementById('smsCode').value.trim();
            const errEl = document.getElementById('errorMsg');
            errEl.textContent = '';
            if (!phone || !code) { errEl.textContent = '请输入手机号和验证码'; return; }
            const res = await fetch('/api/auth/sms/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone, code }) });
            const data = await res.json();
            handleLoginResponse(res, data);
        }

        document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') doPasswordLogin(); });
        document.getElementById('username').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
        document.getElementById('smsCode').addEventListener('keypress', e => { if (e.key === 'Enter') doSmsLogin(); });
        document.getElementById('phone').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('smsCode').focus(); });

        (async function() {
            const res = await fetch('/api/auth/lockout');
            const data = await res.json();
            if (data.locked && data.remaining > 0) startLockout(data.remaining);
        })();
    </script>
</body>
</html>
