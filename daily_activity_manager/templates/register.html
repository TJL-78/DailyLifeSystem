<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 日常活动管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 18px; padding: 44px; width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        .auth-card h2 { text-align: center; margin-bottom: 8px; font-size: 26px; font-weight: 700; background: linear-gradient(135deg, #00b894, #55efc4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-subtitle { text-align: center; color: #636e72; font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #636e72; font-weight: 600; letter-spacing: 0.3px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #dfe6e9; border-radius: 10px; font-size: 14px; transition: border-color 0.2s, box-shadow 0.2s; background: #f8f9fa; }
        .form-group input:focus { outline: none; border-color: #00b894; box-shadow: 0 0 0 3px rgba(0,184,148,0.15); background: #fff; }
        .btn-submit { width: 100%; padding: 13px; background: linear-gradient(135deg, #00b894, #55efc4); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.15s; letter-spacing: 0.5px; }
        .btn-submit:hover { opacity: 0.92; transform: translateY(-1px); }
        .error-msg { color: #d63031; font-size: 13px; text-align: center; margin-top: 14px; min-height: 20px; font-weight: 500; }
        .link-row { text-align: center; margin-top: 20px; font-size: 14px; color: #636e72; }
        .link-row a { color: #667eea; text-decoration: none; font-weight: 600; }
        .link-row a:hover { text-decoration: underline; }
        .hint { font-size: 11px; color: #b2bec3; margin-top: 4px; }
        .auth-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,184,148,0.08) 0%, transparent 70%); pointer-events: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>创建账号</h2>
        <div class="auth-subtitle">开始管理你的日常活动</div>
        <div class="form-group">
            <label>用户名 *</label>
            <input type="text" id="username" placeholder="至少3个字符" autofocus>
        </div>
        <div class="form-group">
            <label>密码 *</label>
            <input type="password" id="password" placeholder="至少6个字符">
        </div>
        <div class="form-group">
            <label>确认密码 *</label>
            <input type="password" id="password2" placeholder="再次输入密码">
        </div>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="email" placeholder="可选">
        </div>
        <div class="form-group">
            <label>显示名称</label>
            <input type="text" id="displayName" placeholder="可选，默认使用用户名">
        </div>
        <button class="btn-submit" onclick="doRegister()">注册</button>
        <div class="error-msg" id="errorMsg"></div>
        <div class="link-row">已有账号？ <a href="/login">去登录</a></div>
    </div>
    <script>
        document.getElementById('password2').addEventListener('keypress', e => { if (e.key === 'Enter') doRegister(); });

        async function doRegister() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            const email = document.getElementById('email').value.trim();
            const displayName = document.getElementById('displayName').value.trim();
            const errEl = document.getElementById('errorMsg');
            errEl.textContent = '';
            if (!username || !password) { errEl.textContent = '用户名和密码不能为空'; return; }
            if (password !== password2) { errEl.textContent = '两次输入的密码不一致'; return; }
            const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, email, display_name: displayName }) });
            const data = await res.json();
            if (res.ok) { window.location.href = '/'; } else { errEl.textContent = data.error || '注册失败'; }
        }
    </script>
</body>
</html>
