<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 日常活动管理系统</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fc; display: flex; justify-content: center; align-items: center; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .auth-card { background: #fff; border-radius: 20px; padding: 48px; width: 440px; border: 1px solid #eef0f4; }
        .auth-card h2 { text-align: center; margin-bottom: 6px; font-size: 24px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.5px; }
        .auth-subtitle { text-align: center; color: #8b8fa8; font-size: 14px; margin-bottom: 32px; font-weight: 400; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #6b7085; font-weight: 600; letter-spacing: 0.2px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #eef0f4; border-radius: 12px; font-size: 14px; transition: border-color 0.15s, box-shadow 0.15s; background: #fafbfd; color: #1a1a2e; }
        .form-group input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.08); background: #fff; }
        .btn-submit { width: 100%; padding: 13px; background: #10b981; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
        .btn-submit:hover { background: #059669; }
        .error-msg { color: #ef4444; font-size: 13px; text-align: center; margin-top: 16px; min-height: 20px; font-weight: 500; }
        .link-row { text-align: center; margin-top: 24px; font-size: 14px; color: #8b8fa8; }
        .link-row a { color: #4f46e5; text-decoration: none; font-weight: 600; }
        .link-row a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>创建账号</h2>
        <div class="auth-subtitle">开始管理你的日常活动</div>
        <div class="form-group">
            <label>用户名 *</label>
            <input type="text" id="username" placeholder="至少3个字符" autofocus>
        </div>
        <div class="form-group">
            <label>密码 *</label>
            <input type="password" id="password" placeholder="至少6个字符">
        </div>
        <div class="form-group">
            <label>确认密码 *</label>
            <input type="password" id="password2" placeholder="再次输入密码">
        </div>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="email" placeholder="可选">
        </div>
        <div class="form-group">
            <label>显示名称</label>
            <input type="text" id="displayName" placeholder="可选，默认使用用户名">
        </div>
        <button class="btn-submit" onclick="doRegister()">注册</button>
        <div class="error-msg" id="errorMsg"></div>
        <div class="link-row">已有账号？ <a href="/login">去登录</a></div>
    </div>
    <script>
        document.getElementById('password2').addEventListener('keypress', e => { if (e.key === 'Enter') doRegister(); });

        async function doRegister() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            const email = document.getElementById('email').value.trim();
            const displayName = document.getElementById('displayName').value.trim();
            const errEl = document.getElementById('errorMsg');
            errEl.textContent = '';
            if (!username || !password) { errEl.textContent = '用户名和密码不能为空'; return; }
            if (password !== password2) { errEl.textContent = '两次输入的密码不一致'; return; }
            const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, email, display_name: displayName }) });
            const data = await res.json();
            if (res.ok) { window.location.href = '/'; } else { errEl.textContent = data.error || '注册失败'; }
        }
    </script>
</body>
</html>
